<div class="page-container">
  <div class="config-layout single-column-layout">
    <div class="page-intro">
      <!-- <div class="page-switch">
        <a href="/configuration/races" class="switch-link active">Nouvelle race</a>
        <a href="/configuration/sakafo" class="switch-link">Configuration sakafo</a>
      </div> -->

      <h1>Nouvelle race</h1>
      <p>Ajoutez une race avec tous ses paramètres (prix, capacité, répartition et incubation).</p>
    </div>

    <div class="form-card">
      <div class="card-header race-header">
        <div class="icon-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v18"/>
            <path d="M3 12h18"/>
            <circle cx="12" cy="12" r="3" opacity="0.5"/>
          </svg>
        </div>
        <h2>Nouvelle race</h2>
        <p class="subtitle">Créez une race adaptée à la table race.</p>
      </div>

      @if (raceMessage) {
        <div class="alert alert-success">{{ raceMessage }}</div>
      }
      @if (raceError) {
        <div class="alert alert-error">{{ raceError }}</div>
      }

      <form (ngSubmit)="onRaceSubmit()" class="form-body">
        <div class="form-group">
          <label for="raceLibelle">Libellé</label>
          <input type="text" id="raceLibelle" [(ngModel)]="raceLibelle" name="raceLibelle" placeholder="Ex: Gasy mena" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="racePuGg">PU g/g</label>
            <input type="number" id="racePuGg" [(ngModel)]="racePuGg" name="racePuGg" step="0.01" placeholder="Ex: 1.5" required>
          </div>
          <div class="form-group">
            <label for="racePvGg">PV g/g</label>
            <input type="number" id="racePvGg" [(ngModel)]="racePvGg" name="racePvGg" step="0.01" placeholder="Ex: 2.3" required>
          </div>
        </div>

        <div class="form-group">
          <label for="racePrixAtody">Prix d'un oeuf</label>
          <input type="number" id="racePrixAtody" [(ngModel)]="racePrixAtody" name="racePrixAtody" step="0.01" placeholder="Ex: 700" required>
        </div>

        <div class="form-group">
          <label for="raceCapaciteOeufs">Capacité oeufs (par femelle)</label>
          <input type="number" id="raceCapaciteOeufs" [(ngModel)]="raceCapaciteOeufs" name="raceCapaciteOeufs" min="0" placeholder="Ex: 220" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="raceMale">% mâle</label>
            <input type="number" id="raceMale" [(ngModel)]="raceMale" name="raceMale" min="0" max="100" placeholder="Ex: 50" required>
          </div>
          <div class="form-group">
            <label for="raceFemelle">% femelle</label>
            <input type="number" id="raceFemelle" [(ngModel)]="raceFemelle" name="raceFemelle" min="0" max="100" placeholder="Ex: 50" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="raceOeufPourri">% oeuf pourri</label>
            <input type="number" id="raceOeufPourri" [(ngModel)]="raceOeufPourri" name="raceOeufPourri" min="0" max="100" placeholder="Ex: 10" required>
          </div>
          <div class="form-group">
            <label for="raceNbJourIncubation">Nb jours incubation</label>
            <input type="number" id="raceNbJourIncubation" [(ngModel)]="raceNbJourIncubation" name="raceNbJourIncubation" min="0" placeholder="Ex: 21" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="raceMortMale">% mortalité mâle</label>
            <input type="number" id="raceMortMale" [(ngModel)]="raceMortMale" name="raceMortMale" min="0" max="100" placeholder="Ex: 5" required>
          </div>
          <div class="form-group">
            <label for="raceMortFemelle">% mortalité femelle</label>
            <input type="number" id="raceMortFemelle" [(ngModel)]="raceMortFemelle" name="raceMortFemelle" min="0" max="100" placeholder="Ex: 4" required>
          </div>
        </div>

        <button type="submit" class="btn-submit">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
          Enregistrer la race
        </button>
      </form>
    </div>
  </div>
</div>
