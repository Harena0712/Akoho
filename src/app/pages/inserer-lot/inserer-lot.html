<div class="page-container">
  <div class="form-card">
    <div class="card-header">
      <div class="icon-circle">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </div>
      <h1>Insérer un nouveau lot</h1>
      <p class="subtitle">Enregistrez un nouveau lot de poules dans le système</p>
    </div>

    @if (message) {
      <div class="alert alert-success">{{ message }}</div>
    }
    @if (error) {
      <div class="alert alert-error">{{ error }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="form-body">
      <div class="form-group">
        <label for="idRace">Race</label>
        <select id="idRace" [(ngModel)]="idRace" name="idRace" required>
          <option [ngValue]="null" disabled>-- Sélectionner une race --</option>
          @for (race of races; track race.id) {
            <option [ngValue]="race.id">{{ race.libelle }}</option>
          }
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="number" id="nombre" [(ngModel)]="nombre" name="nombre" placeholder="Ex: 150" required>
        </div>
        <div class="form-group">
          <label for="age">Âge (semaines)</label>
          <input type="number" id="age" [(ngModel)]="age" name="age" placeholder="Ex: 4" required>
        </div>
      </div>

      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date" [(ngModel)]="date" name="date" required>
      </div>

      <button type="submit" class="btn-submit">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
        Enregistrer le lot
      </button>
    </form>
  </div>
</div>
