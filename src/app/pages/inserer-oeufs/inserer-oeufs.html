<div class="page-container">
  <div class="form-card">
    <div class="card-header">
      <div class="icon-circle">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="14" rx="7" ry="9"/>
        </svg>
      </div>
      <h1>Insérer les oeufs récoltés</h1>
      <p class="subtitle">Enregistrez la récolte d'oeufs par lot</p>
    </div>

    @if (message) {
      <div class="alert alert-success">{{ message }}</div>
    }
    @if (error) {
      <div class="alert alert-error">{{ error }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="form-body">
      <div class="form-group">
        <label for="idLot">Lot</label>
        <select id="idLot" [(ngModel)]="idLot" name="idLot" (change)="onLotOrDateChange()" required>
          <option [ngValue]="null" disabled>-- Sélectionner un lot --</option>
          @for (lot of lots; track lot.id) {
            <option [ngValue]="lot.id">Lot #{{ lot.id }} ({{ lot.nb }} poules)</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="nombreOeufs">Nombre oeufs</label>
        <input type="number" id="nombreOeufs" [(ngModel)]="nombreOeufs" name="nombreOeufs" placeholder="Ex: 120" required>
      </div>

      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date" [(ngModel)]="date" name="date" (change)="onLotOrDateChange()" required>
      </div>

      @if (capaciteLot) {
        <div class="info-capacite">
          <p><strong>Capacité max :</strong> {{ capaciteLot.maxOeufs }}</p>
          <p><strong>Déjà obtenus :</strong> {{ capaciteLot.oeufsObtenus }}</p>
          <p><strong>Reste :</strong> {{ capaciteLot.oeufsRestants }}</p>
        </div>
      }

      <button type="submit" class="btn-submit" [disabled]="capaciteLot && capaciteLot.oeufsRestants <= 0">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
        Enregistrer
      </button>
    </form>
  </div>
</div>
