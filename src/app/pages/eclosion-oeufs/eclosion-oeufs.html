<div class="page-container">
  <div class="form-card">
    <div class="card-header">
      <div class="icon-circle">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C8 2 5 7 5 13a7 7 0 0 0 14 0c0-6-3-11-7-11z"/>
          <path d="M9 14l3-3 3 3"/>
        </svg>
      </div>
      <h1>Éclosion des oeufs en poule</h1>
      <p class="subtitle">Enregistrez les oeufs éclos par lot</p>
    </div>

    @if (message) {
      <div class="alert alert-success">{{ message }}</div>
    }
    @if (error) {
      <div class="alert alert-error">{{ error }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="form-body">
      <div class="form-group">
        <label for="idLotAtody">Oeufs récoltés</label>
        <select id="idLotAtody" [(ngModel)]="idLotAtody" name="idLotAtody" required>
          <option [ngValue]="null" disabled>-- Sélectionner des oeufs --</option>
          @for (o of oeufs; track o.id) {
            <option [ngValue]="o.id">Lot #{{ o.idLot }} - {{ o.race }} ({{ o.nbAtody }} oeufs)</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="nombreEclos">Nombre oeuf éclos</label>
        <input type="number" id="nombreEclos" [(ngModel)]="nombreEclos" name="nombreEclos" placeholder="Ex: 95" required>
      </div>

      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date" [(ngModel)]="date" name="date" required>
      </div>

      <button type="submit" class="btn-submit">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
        Enregistrer
      </button>
    </form>
  </div>
</div>
