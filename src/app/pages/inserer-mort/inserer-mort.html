<div class="page-container">
  <div class="form-card">
    <div class="card-header">
      <div class="icon-circle">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3l18 18M12 12v9"/>
          <path d="M9 3h6v6H9z" opacity="0.5"/>
        </svg>
      </div>
      <h1>Insérer les poules mortes</h1>
      <p class="subtitle">Enregistrez les pertes de poules par lot</p>
    </div>

    @if (message) {
      <div class="alert alert-success">{{ message }}</div>
    }
    @if (error) {
      <div class="alert alert-error">{{ error }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="form-body">
      <div class="form-group">
        <label for="idLot">Lot</label>
        <select id="idLot" [(ngModel)]="idLot" name="idLot" required>
          <option [ngValue]="null" disabled>-- Sélectionner un lot --</option>
          @for (lot of lots; track lot.id) {
            <option [ngValue]="lot.id">Lot #{{ lot.id }} ({{ lot.nb }} poules)</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="nombreMort">Nombre mort</label>
        <input type="number" id="nombreMort" [(ngModel)]="nombreMort" name="nombreMort" placeholder="Ex: 5" required>
      </div>

      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date" [(ngModel)]="date" name="date" required>
      </div>

      <button type="submit" class="btn-submit">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
        Enregistrer
      </button>
    </form>
  </div>
</div>
